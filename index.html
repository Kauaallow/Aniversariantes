<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Aniversariantes A4 - Biofisic</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --cor-texto: #000000;
            --cor-data: #000000; 
            --cor-pontilhado: #000000;
            --cor-fundo-biofisic: #81ce38; /* Verde padrão da marca */
            --fonte-principal: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--fonte-principal);
            background-color: #2b2b2b; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Controlos de Upload e Impressão */
        .controles {
            background: #111;
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        .controles input[type="text"],
        .controles input[type="file"] {
            margin: 10px 0;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #222;
            color: white;
        }

        .controles input[type="text"]::placeholder {
            color: #888;
        }
        
        .grupo-botoes {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn-acao {
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-imprimir { background-color: #81ce38; color: #000; }
        .btn-imprimir:hover { background-color: #6eb52d; }

        .btn-baixar-todas { background-color: #ffffff; color: #000; }
        .btn-baixar-todas:hover { background-color: #e0e0e0; }

        .btn-baixar-unica {
            background-color: #444;
            color: #fff;
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 14px;
        }
        .btn-baixar-unica:hover { background-color: #666; }

        /* CONTAINER DE PÁGINAS */
        #areaImpressao {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; 
        }

        .wrapper-pagina {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CONFIGURAÇÃO ESTRITA DA FOLHA A4 */
        .folha-a4 {
            width: 210mm;
            height: 297mm; 
            background-color: var(--cor-fundo-biofisic);
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,1);
            position: relative;
            overflow: hidden; 
            
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
        }

        /* --- CABEÇALHO --- */
        .cabecalho-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15mm; 
        }

        .logo-biofisic {
            width: 220px; 
            margin-bottom: 5mm;
        }

        .linha-cabecalho {
            background-color: #000000;
            color: #ffffff;
            padding: 6px 20px;
            border-radius: 20px; 
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 6px; 
            letter-spacing: 1.5px;
        }

        /* --- RODAPÉ --- */
        .rodape-container {
            width: 100%;
            margin-bottom: 15mm; 
            display: flex;
            justify-content: center;
        }

        .caixa-rodape {
            background-color: #000000;
            color: #ffffff;
            border-radius: 18px; 
            padding: 16px 35px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px; 
        }

        .texto-rodape {
            display: flex;
            flex-direction: column;
            text-align: center; 
            font-size: 20px; 
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }

        /* --- CORPO DA LISTA (NOMES) --- */
        .container-nomes {
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding: 0 15mm; 
        }

        .grid-duas-colunas {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 40px; 
        }

        .coluna {
            width: 50%; 
            display: flex;
            flex-direction: column;
        }

        .item-aniversariante {
            display: flex;
            align-items: flex-end; 
            margin-bottom: 5px; 
            font-size: 11px; 
            width: 100%; 
        }

        .nome {
            font-weight: 700; 
            text-transform: uppercase; 
            white-space: nowrap;
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 78%; 
            color: var(--cor-texto);
        }

        .pontilhados {
            flex-grow: 1; 
            border-bottom: 2px dotted var(--cor-pontilhado);
            margin: 0 4px; 
            position: relative;
            top: -3px; 
        }

        .dia {
            font-weight: 800;
            color: var(--cor-data);
            font-size: 14px; 
            line-height: 1;
        }

        /* REGRAS DE IMPRESSÃO */
        @media print {
            body { background-color: transparent; padding: 0; margin: 0; }
            .controles, .btn-baixar-unica { display: none !important; }
            #areaImpressao { gap: 0; }
            .wrapper-pagina { margin: 0; padding: 0; }
            .folha-a4 {
                box-shadow: none;
                margin: 0;
                width: 210mm;
                height: 297mm;
                page-break-after: always; 
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="controles">
        <h2>Gerador de Lista A4</h2>
        
        <input type="text" id="mesInput" placeholder="Digite o Mês (Ex: ABRIL)">
        <input type="text" id="nomeArquivoInput" placeholder="Nome para o arquivo ZIP (Ex: Unidade_Batatais)">
        
        <p style="margin-bottom: 5px;">Faça o upload da planilha <strong>Excel (.XLS / .XLSX)</strong></p>
        <input type="file" id="arquivoExcel" accept=".xls,.xlsx">
        
        <div class="grupo-botoes">
            <button class="btn-acao btn-imprimir" onclick="window.print()">🖨️ Exportar PDF</button>
            <button class="btn-acao btn-baixar-todas" onclick="baixarTodasEmZip()">📥 Baixar Todas as Imagens</button>
        </div>
    </div>

    <div id="areaImpressao">
        </div>

    <script>
        document.getElementById('arquivoExcel').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            
            reader.onload = function(evento) {
                const data = new Uint8Array(evento.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                const linhasExcel = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                
                processarDadosExcel(linhasExcel);
            };
            
            reader.readAsArrayBuffer(file); 
        });

        function processarDadosExcel(linhas) {
            let aniversariantes = [];
            let processandoNomes = false;

            for (let i = 0; i < linhas.length; i++) {
                const inline = linhas[i];
                if (!inline || inline.length === 0) continue;

                const celulasPreenchidas = inline.filter(celula => celula !== null && celula !== undefined && String(celula).trim() !== '');
                if (celulasPreenchidas.length === 0) continue;

                const linhaTexto = celulasPreenchidas.join(' ').toLowerCase();

                if (linhaTexto.includes('nome') && linhaTexto.includes('dia')) {
                    processandoNomes = true;
                    continue; 
                }

                if (processandoNomes) {
                    let nomeExtraido = '';
                    let diaExtraido = '';
                    const ultimoElemento = String(celulasPreenchidas[celulasPreenchidas.length - 1]).trim();

                    if (!isNaN(ultimoElemento)) {
                        diaExtraido = ultimoElemento;
                        nomeExtraido = celulasPreenchidas.slice(0, celulasPreenchidas.length - 1).join(' ').trim();
                    } else {
                        for (let j = 0; j < celulasPreenchidas.length; j++) {
                            let valor = String(celulasPreenchidas[j]).trim();
                            if (!isNaN(valor)) {
                                diaExtraido = valor;
                            } else {
                                nomeExtraido += (nomeExtraido ? ' ' : '') + valor;
                            }
                        }
                    }

                    if (nomeExtraido && diaExtraido) {
                        aniversariantes.push({ nome: nomeExtraido, dia: diaExtraido });
                    }
                }
            }

            const areaImpressao = document.getElementById('areaImpressao');
            areaImpressao.innerHTML = ''; 

            const mesDigitado = document.getElementById('mesInput').value.trim() || '...';

            const LIMITE_POR_FOLHA = 70; 
            const totalPaginas = Math.ceil(aniversariantes.length / LIMITE_POR_FOLHA);

            for(let p = 0; p < totalPaginas; p++) {
                const itensDestaPagina = aniversariantes.slice(p * LIMITE_POR_FOLHA, (p + 1) * LIMITE_POR_FOLHA);

                const wrapper = document.createElement('div');
                wrapper.className = 'wrapper-pagina';

                const folha = document.createElement('div');
                folha.className = 'folha-a4';
                folha.id = `folha_render_${p + 1}`;
                
                // 1. CABEÇALHO
                const cabecalho = document.createElement('div');
                cabecalho.className = 'cabecalho-container';
                cabecalho.innerHTML = `
                    <img src="logo-principal-preto.png" class="logo-biofisic" alt="Logo Biofisic">
                    <div class="linha-cabecalho">ANIVERSARIANTES</div>
                    <div class="linha-cabecalho">DO MÊS DE ${mesDigitado}</div>
                `;
                folha.appendChild(cabecalho);

                // 2. CORPO
                const containerNomes = document.createElement('div');
                containerNomes.className = 'container-nomes';

                const grid = document.createElement('div');
                grid.className = 'grid-duas-colunas';

                const colEsq = document.createElement('div');
                colEsq.className = 'coluna';
                const colDir = document.createElement('div');
                colDir.className = 'coluna';

                const metade = Math.ceil(itensDestaPagina.length / 2);

                itensDestaPagina.forEach((pessoa, index) => {
                    const div = document.createElement('div');
                    div.className = 'item-aniversariante';
                    div.innerHTML = `
                        <span class="nome" title="${pessoa.nome}">${pessoa.nome}</span>
                        <span class="pontilhados"></span>
                        <span class="dia">${pessoa.dia}</span>
                    `;
                    
                    if (index < metade) {
                        colEsq.appendChild(div);
                    } else {
                        colDir.appendChild(div);
                    }
                });

                grid.appendChild(colEsq);
                grid.appendChild(colDir);
                containerNomes.appendChild(grid);
                folha.appendChild(containerNomes);

                // 3. RODAPÉ
                const rodape = document.createElement('div');
                rodape.className = 'rodape-container';
                rodape.innerHTML = `
                    <div class="caixa-rodape">
                        <div class="texto-rodape">
                            <span>DESEJAMOS A TODOS</span>
                            <span>UM FELIZ ANIVERSÁRIO A TODOS</span>
                        </div>
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 6C12.5523 6 13 5.55228 13 5V3C13 2.44772 12.5523 2 12 2C11.4477 2 11 2.44772 11 3V5C11 5.55228 11.4477 6 12 6Z"/>
                            <path d="M16 7C16.5523 7 17 6.55228 17 6V4C17 3.44772 16.5523 3 16 3C15.4477 3 15 3.44772 15 4V6C15 6.55228 15.4477 7 16 7Z"/>
                            <path d="M8 7C8.55228 7 9 6.55228 9 6V4C9 3.44772 8.55228 3 8 3C7.44772 3 7 3.44772 7 4V6C7 6.55228 7.44772 7 8 7Z"/>
                            <path d="M21 13V11C21 9.89543 20.1046 9 19 9H5C3.89543 9 3 9.89543 3 11V13C3 13.5523 3.44772 14 4 14H20C20.5523 14 21 13.5523 21 13Z"/>
                            <path d="M4 16V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V16H4Z"/>
                        </svg>
                    </div>
                `;
                folha.appendChild(rodape);
                
                wrapper.appendChild(folha);

                // Botão individual
                const btnBaixar = document.createElement('button');
                btnBaixar.className = 'btn-acao btn-baixar-unica';
                btnBaixar.innerText = `⬇️ Baixar esta página (${p + 1})`;
                btnBaixar.onclick = () => baixarImagemIndividual(folha.id, p + 1);
                
                wrapper.appendChild(btnBaixar);
                areaImpressao.appendChild(wrapper);
            }
        }

        // Gera e dispara o download direto de uma única imagem
        async function baixarImagemIndividual(idFolha, numeroPagina) {
            const folha = document.getElementById(idFolha);
            if (!folha) return;

            let nomeBase = document.getElementById('nomeArquivoInput').value.trim();
            if(nomeBase === "") nomeBase = "Aniversariantes_Biofisic";

            const canvas = await html2canvas(folha, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: "#81ce38" 
            });

            const link = document.createElement('a');
            link.download = `${nomeBase}_Pagina_${numeroPagina}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // --- NOVA LÓGICA: GERA TODAS AS IMAGENS E COMPACTA EM EM ZIP ---
        async function baixarTodasEmZip() {
            const folhas = document.querySelectorAll('.folha-a4');
            
            if (folhas.length === 0) {
                alert("Por favor, faça o upload de uma planilha primeiro!");
                return;
            }

            let nomeBase = document.getElementById('nomeArquivoInput').value.trim();
            if(nomeBase === "") {
                nomeBase = "Aniversariantes_Biofisic";
            }

            const btn = document.querySelector('.btn-baixar-todas');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = "⏳ Gerando ZIP...";
            btn.disabled = true;

            // Inicializa a instância do JSZip
            const zip = new JSZip();

            for (let i = 0; i < folhas.length; i++) {
                const folha = folhas[i];
                
                const canvas = await html2canvas(folha, {
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: "#81ce38" 
                });

                // Converte o canvas para base64 cortando o cabeçalho de dados do link
                const imgData = canvas.toDataURL('image/png').split(',')[1];
                
                // Adiciona a imagem dentro do zip virtual
                zip.file(`${nomeBase}_Pagina_${i + 1}.png`, imgData, {base64: true});
            }

            // Gera o arquivo .zip final e dispara um único download
            zip.generateAsync({type: "blob"}).then(function(content) {
                const link = document.createElement('a');
                link.download = `${nomeBase}.zip`;
                link.href = URL.createObjectURL(content);
                link.click();
                
                // Restaura o botão após finalizar
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
